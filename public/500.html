<!doctype html>

<html lang="en">

  <head>

    <title>We’re sorry, but something went wrong (500 Internal Server Error)</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">

    <style>

      *, *::before, *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
      }

      html {
        font-size: 16px;
      }

      body {
        background: #FFF;
        color: #261B23;
        display: grid;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Aptos, Roboto, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        font-size: clamp(1rem, 2.5vw, 2rem);
        -webkit-font-smoothing: antialiased;
        font-style: normal;
        font-weight: 400;
        letter-spacing: -0.0025em;
        line-height: 1.4;
        min-height: 100vh;
        place-items: center;
        text-rendering: optimizeLegibility;
        -webkit-text-size-adjust: 100%;
      }

      a {
        color: inherit;
        font-weight: 700;
        text-decoration: underline;
        text-underline-offset: 0.0925em;
      }

      b, strong {
        font-weight: 700;
      }

      i, em {
        font-style: italic;
      }

      main {
        display: grid;
        gap: 1em;
        padding: 2em;
        place-items: center;
        text-align: center;
      }

      main header {
        width: min(100%, 14em);
      }

      main header svg {
        height: auto;
        max-width: 100%;
        width: 100%;
      }

      .error-code {
        font-size: 4.5em;
        font-weight: 800;
        color: #f0eff0;
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .error-code span {
        color: #d30001;
      }

      main article {
        width: min(100%, 30em);
      }

      main article p {
        font-size: 75%;
        color: #555;
      }

      main article br {

        display: none;

        @media(min-width: 48em) {
          display: inline;
        }

      }

    </style>

  </head>

  <body>

    <!-- This file lives in public/500.html -->

    <main>
      <header>
        <!-- Finance bar chart icon with falling trend -->
        <svg viewBox="0 0 120 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="10" y1="95" x2="110" y2="95" stroke="#e5e5e5" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="10" y1="72"  x2="110" y2="72"  stroke="#f0eff0" stroke-width="1.5" stroke-dasharray="4 4"/>
          <line x1="10" y1="49"  x2="110" y2="49"  stroke="#f0eff0" stroke-width="1.5" stroke-dasharray="4 4"/>
          <line x1="10" y1="26"  x2="110" y2="26"  stroke="#f0eff0" stroke-width="1.5" stroke-dasharray="4 4"/>
          <line x1="10" y1="95"  x2="10"  y2="12"  stroke="#e5e5e5" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="20" y="49" width="15" height="46" rx="3" fill="#d1d5db"/>
          <rect x="41" y="63" width="15" height="32" rx="3" fill="#d1d5db"/>
          <rect x="62" y="35" width="15" height="60" rx="3" fill="#d30001"/>
          <rect x="83" y="55" width="15" height="40" rx="3" fill="#d1d5db"/>
          <polyline points="69,23 69,13 79,13" stroke="#d30001" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="62" y1="22" x2="79" y2="6" stroke="#d30001" stroke-width="2.5" stroke-linecap="round"/>
          <polyline points="74,6 79,6 79,11" stroke="#d30001" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </header>
      <div class="error-code">5<span>0</span>0</div>
      <article>
        <p><strong>Algo salió mal en nuestro servidor.</strong><br> Estamos trabajando para resolverlo &mdash; inténtalo de nuevo en un momento. Si eres el dueño de la app, revisa los logs para más información.</p>
      </article>
    </main>

  </body>

</html>
